<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS MILITAR - Projeção Tática Geodésica</title>
    <style>
        :root {
            --primary: #00FFCC;
            --secondary: #FFCC00;
            --bg-dark: #03070A;
            --panel-bg: rgba(3, 15, 22, 0.9);
            --border-color: rgba(0, 255, 204, 0.3);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            color: #FFFFFF;
            user-select: none;
        }

        #header-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 20px;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(3,20,30,0.95) 0%, rgba(3,7,10,0) 100%);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .vector-selector-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 15px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .vector-selector-container label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        #vector-select {
            background: transparent;
            color: var(--primary);
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        #vector-select option {
            background: var(--bg-dark);
            color: #FFF;
        }

        #target-hud {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            z-index: 90;
            font-size: 0.8rem;
            line-height: 1.4;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .hud-label { color: rgba(255,255,255,0.5); font-size: 0.7rem; }
        .hud-value { color: var(--primary); font-weight: bold; }
        .hud-target { color: var(--secondary); font-size: 0.95rem; font-weight: bold; margin-top: 5px; }

        #reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 204, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }
        #reticle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 2px;
            background: var(--primary);
            transform: translate(-50%, -50%);
        }

        #canvas-container { width: 100vw; height: 100vh; }
    </style>

    <!-- Motores gráficos oficiais do Three.js injetados -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="header-hud">
        <div class="brand-title">LKS MILITAR // TACTICAL VECTOR</div>
        <div class="vector-selector-container">
            <label for="vector-select">VETOR ATIVO</label>
            <select id="vector-select"></select>
        </div>
    </div>

    <div id="reticle"></div>

    <div id="target-hud">
        <div class="hud-label">TELEMETRIA DE PROJEÇÃO</div>
        <div id="selected-vector-display" class="hud-value">F-15E STRIKE EAGLE</div>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 8px 0;">
        <div id="coords-display">LAT: -- | LON: --</div>
        <div id="target-display" class="hud-target">CLIQUE NO GLOBO</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. BANCO DE DADOS DE VETORES
        const AIRCRAFT_DATABASE = [
            { id: 'f15e', name: 'F-15E Strike Eagle', rangeKm: 1270, color: 0x00FFCC },
            { id: 'su35', name: 'Su-35 Flanker-E', rangeKm: 1600, color: 0xFF9900 },
            { id: 'gripen', name: 'JAS 39 Gripen E', rangeKm: 800, color: 0x00AABB },
            { id: 'rafale', name: 'Dassault Rafale F4', rangeKm: 1100, color: 0xFF0055 }
        ];

        let selectedVector = AIRCRAFT_DATABASE[0];
        const selector = document.getElementById('vector-select');
        
        AIRCRAFT_DATABASE.forEach(vector => {
            const opt = document.createElement('option');
            opt.value = vector.id;
            opt.innerText = `${vector.name} [ RAIO: ${vector.rangeKm} KM ]`;
            selector.appendChild(opt);
        });

        selector.addEventListener('change', (e) => {
            selectedVector = AIRCRAFT_DATABASE.find(v => v.id === e.target.value);
            document.getElementById('selected-vector-display').innerText = `VETOR: ${selectedVector.name.toUpperCase()}`;
        });

        // 2. CONFIGURAÇÃO DO MOTOR GRÁFICO 3D (Three.js)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false; 
        controls.minDistance = 2.0;
        controls.maxDistance = 5.0;

        // 3. GERAÇÃO DA MATRIZ DO GLOBO (VETORIAL)
        const globeRadius = 1.5;
        const earthRadiusKm = 6371; 
        const numPoints = 14000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(numPoints * 3);
        const colors = new Float32Array(numPoints * 3);
        const baseColors = new Float32Array(numPoints * 3);
        const phi = Math.PI * (3 - Math.sqrt(5));

        const mapaGeodésicoMemoria = [];

        function checarSeEContinente(lat, lon) {
            if (lon > -170 && lon < -30 && lat > -56 && lat < 72) {
                if (lon > -90 && lon < -34 && lat > -35 && lat < 12) return true;
                if (lon > -168 && lon < -50 && lat > 7 && lat < 72) return true;
            }
            if (lon > -15 && lon < 180 && lat > -35 && lat < 75) {
                if (lon > -20 && lon < 55 && lat > -35 && lat < 37) return true;
                if (lon > -10 && lon < 180 && lat > 35 && lat < 75) return true;
                if (lon > 25 && lon < 145 && lat > -10 && lat < 55) return true;
            }
            if (lon > 110 && lon < 180 && lat > -50 && lat < 0) return true;
            if (lat < -60) return true;
            return false;
        }

        for (let i = 0; i < numPoints; i++) {
            const y = 1 - (i / (numPoints - 1)) * 2;
            const radiusAtY = Math.sqrt(1 - y * y);
            const theta = phi * i;

            const px = Math.cos(theta) * radiusAtY * globeRadius;
            const py = y * globeRadius;
            const pz = Math.sin(theta) * radiusAtY * globeRadius;

            positions[i * 3]     = px;
            positions[i * 3 + 1] = py;
            positions[i * 3 + 2] = pz;

            const lat = Math.asin(py / globeRadius) * (180 / Math.PI);
            const lon = Math.atan2(-px, pz) * (180 / Math.PI);

            const eTerra = checarSeEContinente(lat, lon);

            if (eTerra) {
                colors[i * 3]     = baseColors[i * 3]     = 0.0;
                colors[i * 3 + 1] = baseColors[i * 3 + 1] = 0.4;
                colors[i * 3 + 2] = baseColors[i * 3 + 2] = 0.3;
            } else {
                colors[i * 3]     = baseColors[i * 3]     = 0.08;
                colors[i * 3 + 1] = baseColors[i * 3 + 1] = 0.12;
                colors[i * 3 + 2] = baseColors[i * 3 + 2] = 0.18;
            }

            mapaGeodésicoMemoria.push({ lat: lat, lon: lon });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.015,
            vertexColors: true,
            transparent: true,
            opacity: 0.85
        });

        const globe = new THREE.Points(geometry, material);
        scene.add(globe);

        const hitSphereGeom = new THREE.SphereGeometry(globeRadius, 32, 32);
        const hitSphereMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 });
        const hitSphere = new THREE.Mesh(hitSphereGeom, hitSphereMat);
        scene.add(hitSphere);

        // 4. MOTOR DE INTERAÇÃO
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let activeRing = null;

        function calcularDistanciaRealKM(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const dLat = (lat2 - lat1) * toRad;
            const dLon = (lon2 - lon1) * toRad;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return earthRadiusKm * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        window.addEventListener('click', (event) => {
            if (event.target.closest('.vector-selector-container')) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(hitSphere);
            
            if (intersects.length > 0) {
                const point = intersects[0].point;
                const localPoint = hitSphere.worldToLocal(point.clone());
                
                const latClique = Math.asin(localPoint.y / globeRadius) * (180 / Math.PI);
                const lonClique = Math.atan2(-localPoint.x, localPoint.z) * (180 / Math.PI);
                const raioCombateRealKm = selectedVector.rangeKm;
                
                desenharAnelProjecao(point, intersects[0].normal, raioCombateRealKm, selectedVector.color);
                
                const colorAttribute = geometry.attributes.color;
                for (let i = 0; i < numPoints; i++) {
                    const pontoGeo = mapaGeodésicoMemoria[i];
                    const distanciaKM = calcularDistanciaRealKM(latClique, lonClique, pontoGeo.lat, pontoGeo.lon);
                    
                    if (distanciaKM <= raioCombateRealKm) {
                        const c = new THREE.Color(selectedVector.color);
                        colorAttribute.setXYZ(i, c.r, c.g, c.b);
                    } else {
                        colorAttribute.setXYZ(i, baseColors[i * 3], baseColors[i * 3 + 1], baseColors[i * 3 + 2]);
                    }
                }
                colorAttribute.needsUpdate = true;
                
                document.getElementById('coords-displayinnerHTML'] = `BASE LAT: ${latClique.toFixed(4)}° | LON: ${lonClique.toFixed(4)}°`;
                document.getElementById('target-display').innerHTML = `RAIO COMBATE: ${raioCombateRealKm.toFixed(0)} KM`;
            }
        });

        function desenharAnelProjecao(position, normal, raioKm, hexColor) {
            if (activeRing) scene.remove(activeRing);
            const angularDistance = raioKm / earthRadiusKm;
            const visualRadius = globeRadius * Math.sin(angularDistance);
            
            const ringGeom = new THREE.RingGeometry(Math.max(0.001, visualRadius - 0.015), visualRadius, 64);
            const ringMat = new THREE.MeshBasicMaterial({
                color: hexColor,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.9,
                depthTest: false
            });
            activeRing = new THREE.Mesh(ringGeom, ringMat);
            activeRing.position.copy(position);
            activeRing.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normal);
            scene.add(activeRing);
        }

        // 5. LOOP DE ATUALIZAÇÃO SÍNCRONA
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            globe.rotation.y += 0.0003;
            hitSphere.rotation.y += 0.0003;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
