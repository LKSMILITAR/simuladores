<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS MILITAR - Projeção Geodésica Consumo Energetico</title>
    <style>
        :root {
            --primary: #00FFCC;
            --secondary: #FFCC00;
            --bg-dark: #020508;
            --panel-bg: rgba(3, 15, 22, 0.95);
            --border-color: rgba(0, 255, 204, 0.3);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-main);
            user-select: none;
            display: flex;
        }

        /* SIDEBAR TÁTICA */
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            box-shadow: 5px 0 20px rgba(0,0,0,0.8);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: auto;
            overflow-y: auto;
        }

        .brand-container {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,204,0.4);
            margin-bottom: 5px;
        }

        .brand-sub { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }

        .control-group { margin-bottom: 20px; }
        .control-label { font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 8px; }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: var(--primary);
            border: 1px solid var(--border-color);
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }
        select option { background: var(--bg-dark); color: #FFF; }

        /* PAINEL DE TELEMETRIA */
        .telemetry-panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 4px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .data-row { margin-bottom: 12px; }
        .data-label { font-size: 0.7rem; color: var(--text-dim); }
        .data-value { font-size: 1rem; color: var(--primary); font-weight: bold; margin-top: 3px; word-wrap: break-word;}
        .data-target { color: var(--secondary); font-size: 1.1rem; }

        .system-status {
            margin-top: auto;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: center;
            padding-top: 15px;
            border-top: 1px dashed rgba(255,255,255,0.2);
        }

        /* MOTOR GRÁFICO (CANVAS) */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 320px;
            width: calc(100vw - 320px);
            height: 100vh;
            z-index: 1;
        }

        /* =========================================
           RESPONSIVIDADE: MODO MOBILE
           ========================================= */
        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                height: 42vh;
                top: auto;
                bottom: 0;
                border-right: none;
                border-top: 1px solid var(--border-color);
            }
            #canvas-container {
                left: 0;
                width: 100vw;
                height: 58vh;
            }
            .brand-container { margin-bottom: 15px; padding-bottom: 10px; }
            .data-row { margin-bottom: 8px; }
            .telemetry-panel { padding: 10px; }
        }
    </style>

    <!-- BIBLIOTECAS ENGINE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>

    <div id="sidebar">
        <div class="brand-container">
            <div class="brand-title">LKS MILITAR</div>
            <div class="brand-sub">SISTEMA DE PROJEÇÃO TÁTICA // DGGS</div>
        </div>

        <div class="control-group">
            <label class="control-label">1. PLATAFORMA DE OPERAÇÃO</label>
            <select id="vector-select"></select>
        </div>

        <div class="telemetry-panel">
            <div class="control-label">2. TELEMETRIA DO VETOR</div>
            
            <div class="data-row">
                <div class="data-label">VETOR ATIVO</div>
                <div class="data-value" id="disp-vector">F-15E STRIKE EAGLE</div>
            </div>
            
            <div class="data-row">
                <div class="data-label">COORDENADA (TEMPO REAL)</div>
                <div class="data-value" id="disp-coords">AGUARDANDO...</div>
            </div>

            <div class="data-row">
                <div class="data-label">RAIO OPERACIONAL</div>
                <div class="data-value" id="disp-range">1270 KM</div>
            </div>

            <hr style="border:0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">

            <div class="data-row">
                <div class="data-label">DOMÍNIO AÉREO COMPROMETIDO</div>
                <div class="data-value data-target" id="disp-target">CLIQUE NO GLOBO</div>
            </div>
        </div>

        <div class="system-status" id="disp-status">
            CONECTANDO BANCO GEODÉSICO...
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // Trava para mobile e desktop não vazarem eventos pro canvas
        const sidebar = document.getElementById('sidebar');
        sidebar.addEventListener('mousedown', (e) => e.stopPropagation());
        sidebar.addEventListener('touchstart', (e) => e.stopPropagation());
        sidebar.addEventListener('wheel', (e) => e.stopPropagation());

        // 1. BANCO DE DADOS
        const AIRCRAFT_DATABASE = [
            { id: 'f15e', name: 'F-15E Strike Eagle', rangeKm: 1270, color: '#00FFCC' },
            { id: 'su35', name: 'Su-35 Flanker-E', rangeKm: 1600, color: '#FF9900' },
            { id: 'gripen', name: 'JAS 39 Gripen E', rangeKm: 800, color: '#00AABB' },
            { id: 'rafale', name: 'Dassault Rafale F4', rangeKm: 1100, color: '#FF0055' },
            { id: 'b2', name: 'B-2 Spirit', rangeKm: 5500, color: '#FFFFFF' }
        ];

        let selectedVector = AIRCRAFT_DATABASE[0];
        const selector = document.getElementById('vector-select');

        AIRCRAFT_DATABASE.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.id; opt.innerText = `${v.name} [ ${v.rangeKm} KM ]`;
            selector.appendChild(opt);
        });

        selector.addEventListener('change', (e) => {
            selectedVector = AIRCRAFT_DATABASE.find(v => v.id === e.target.value);
            document.getElementById('disp-vector').innerText = selectedVector.name.toUpperCase();
            document.getElementById('disp-range').innerText = `${selectedVector.rangeKm} KM`;
            limparProjecao();
        });

        // 2. MOTOR GRÁFICO (WEBGL)
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020508, 0.08);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 3.8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false; 
        controls.minDistance = 1.8; 
        controls.maxDistance = 5.0; 
        controls.minPolarAngle = 0.15; 
        controls.maxPolarAngle = Math.PI - 0.15; 

        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // 3. BRILHO ATMOSFÉRICO (GLOW)
        const globeRadius = 1.5;
        const atmosGeom = new THREE.SphereGeometry(globeRadius * 1.1, 64, 64);
        const atmosMat = new THREE.MeshBasicMaterial({
            color: 0x004466,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending
        });
        const atmosSphere = new THREE.Mesh(atmosGeom, atmosMat);
        globeGroup.add(atmosSphere);

        // 4. REDE DE FIBONACCI
        const earthRadiusKm = 6371;
        const numPoints = 12000; 
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(numPoints * 3);
        const colors = new Float32Array(numPoints * 3);
        
        const mapaPontosMemoria = [];
        const phi = Math.PI * (3 - Math.sqrt(5)); 

        for (let i = 0; i < numPoints; i++) {
            const y = 1 - (i / (numPoints - 1)) * 2; 
            const radiusAtY = Math.sqrt(1 - y * y);
            const theta = phi * i;

            const posX = Math.cos(theta) * radiusAtY * globeRadius;
            const posY = y * globeRadius;
            const posZ = Math.sin(theta) * radiusAtY * globeRadius;

            positions[i * 3] = posX;
            positions[i * 3 + 1] = posY;
            positions[i * 3 + 2] = posZ;

            colors[i * 3] = 0.08; colors[i * 3 + 1] = 0.12; colors[i * 3 + 2] = 0.18; 

            const lat = Math.asin(posY / globeRadius) * (180 / Math.PI);
            const lon = Math.atan2(-posX, posZ) * (180 / Math.PI);

            mapaPontosMemoria.push({ index: i, x: posX, y: posY, z: posZ, lat: lat, lon: lon, pais: "Oceano" });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const globeMaterial = new THREE.PointsMaterial({ size: 0.012, vertexColors: true, transparent: true, opacity: 0.9 });
        const globe = new THREE.Points(geometry, globeMaterial);
        globeGroup.add(globe);

        const hitSphere = new THREE.Mesh(
            new THREE.SphereGeometry(globeRadius, 32, 32),
            new THREE.MeshBasicMaterial({ visible: false })
        );
        globeGroup.add(hitSphere);

        // CARGA GEOGRÁFICA D3
        d3.json('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson')
            .then(geoJson => {
                const colorAttribute = geometry.attributes.color;
                mapaPontosMemoria.forEach(pt => {
                    for (let i = 0; i < geoJson.features.length; i++) {
                        if (d3.geoContains(geoJson.features[i], [pt.lon, pt.lat])) {
                            pt.pais = geoJson.features[i].properties.ADMIN || "Território Continental";
                            colorAttribute.setXYZ(pt.index, 0.0, 0.35, 0.25); 
                            break;
                        }
                    }
                });
                colorAttribute.needsUpdate = true;
                document.getElementById('disp-status').innerText = "STATUS: ONLINE (MALHA ATIVA)";
                document.getElementById('disp-status').style.color = "var(--primary)";
            });

        // 5. INTERAÇÕES: HOVER E CLIQUE
        let activeMarker = null;
        let activeRing = null;
        let fadeTimeout = null;

        function criarMarcadorHUD(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = colorHex;
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(64, 64, 40, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(64, 10); ctx.lineTo(64, 118); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(10, 64); ctx.lineTo(118, 64); ctx.stroke();
            ctx.fillStyle = colorHex;
            ctx.beginPath(); ctx.arc(64, 64, 8, 0, Math.PI * 2); ctx.fill();

            const texture = new THREE.CanvasTexture(canvas);
            // depthTest: true garante que o ícone desaparece quando vai para trás do planeta
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: true, transparent: true });
            return new THREE.Sprite(spriteMat);
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isSimulating = false;

        // Efeito Radar (Hover dinâmico)
        let lastHover = 0;
        container.addEventListener('mousemove', (event) => {
            if (Date.now() - lastHover < 40) return; // Limite de quadros para poupar CPU
            lastHover = Date.now();

            const rect = container.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(hitSphere);

            if (intersects.length > 0) {
                const localPoint = globeGroup.worldToLocal(intersects[0].point.clone());
                const lat = Math.asin(localPoint.y / globeRadius) * (180 / Math.PI);
                const lon = Math.atan2(-localPoint.x, localPoint.z) * (180 / Math.PI);
                document.getElementById('disp-coords').innerHTML = `LAT: ${lat.toFixed(3)}°<br>LON: ${lon.toFixed(3)}°`;
            } else if (!isSimulating) {
                document.getElementById('disp-coords').innerHTML = "AGUARDANDO...";
            }
        });

        // Efeito Tático (Clique)
        container.addEventListener('click', (event) => {
            const rect = container.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(hitSphere);

            if (intersects.length > 0) {
                isSimulating = true;
                if(fadeTimeout) clearTimeout(fadeTimeout);

                const intersect = intersects[0];
                const localPoint = globeGroup.worldToLocal(intersect.point.clone());
                const raioKm = selectedVector.rangeKm;

                // MARCADOR HUD (Levemente elevado para não sofrer Z-fighting, mas respeitando profundidade)
                if(activeMarker) globeGroup.remove(activeMarker);
                activeMarker = criarMarcadorHUD(selectedVector.color);
                activeMarker.position.copy(localPoint.clone().normalize().multiplyScalar(globeRadius * 1.05));
                activeMarker.scale.set(0.12, 0.12, 1);
                globeGroup.add(activeMarker);

                const thetaHalf = raioKm / (2 * earthRadiusKm);
                const chordLimitSq = Math.pow(2 * globeRadius * Math.sin(thetaHalf), 2);
                
                const colorAttr = geometry.attributes.color;
                const hitColor = new THREE.Color(selectedVector.color);

                let paisAtingido = "OCEANO / ÁGUAS INTERNACIONAIS";
                let menorDist = Infinity;

                for (let i = 0; i < numPoints; i++) {
                    const pt = mapaPontosMemoria[i];
                    const distSq = Math.pow(pt.x - localPoint.x, 2) + Math.pow(pt.y - localPoint.y, 2) + Math.pow(pt.z - localPoint.z, 2);

                    if (distSq <= chordLimitSq) {
                        colorAttr.setXYZ(i, hitColor.r, hitColor.g, hitColor.b);
                    } else {
                        if (pt.pais !== "Oceano") colorAttr.setXYZ(i, 0.0, 0.35, 0.25);
                        else colorAttr.setXYZ(i, 0.08, 0.12, 0.18);
                    }

                    if (distSq < menorDist && pt.pais !== "Oceano") {
                        menorDist = distSq;
                        paisAtingido = pt.pais;
                    }
                }
                colorAttr.needsUpdate = true;

                // ANEL PULSANTE COM DEPTH TEST ATIVO E LEVE OFFSET DE ALTITUDE (1%)
                if(activeRing) globeGroup.remove(activeRing);
                const ringRad = globeRadius * Math.sin(raioKm / earthRadiusKm);
                const ringMat = new THREE.MeshBasicMaterial({ color: selectedVector.color, side: THREE.DoubleSide, transparent: true, opacity: 0.8, depthTest: true });
                activeRing = new THREE.Mesh(new THREE.RingGeometry(ringRad - 0.012, ringRad, 64), ringMat);
                activeRing.position.copy(localPoint.clone().normalize().multiplyScalar(globeRadius * 1.01));
                activeRing.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), intersect.point.clone().normalize());
                globeGroup.add(activeRing);

                document.getElementById('disp-target').innerText = paisAtingido.toUpperCase();
                document.getElementById('disp-target').style.color = (paisAtingido !== "OCEANO / ÁGUAS INTERNACIONAIS") ? "var(--secondary)" : "var(--primary)";

                // Auto-Wipe após 8 segundos
                fadeTimeout = setTimeout(() => { limparProjecao(); }, 8000);
            }
        });

        function limparProjecao() {
            isSimulating = false;
            if(activeMarker) globeGroup.remove(activeMarker);
            if(activeRing) globeGroup.remove(activeRing);
            document.getElementById('disp-target').innerText = "CLIQUE NO GLOBO";
            document.getElementById('disp-target').style.color = "var(--secondary)";
            
            const colorAttr = geometry.attributes.color;
            for (let i = 0; i < numPoints; i++) {
                const pt = mapaPontosMemoria[i];
                if (pt.pais !== "Oceano") colorAttr.setXYZ(i, 0.0, 0.35, 0.25);
                else colorAttr.setXYZ(i, 0.08, 0.12, 0.18);
            }
            colorAttr.needsUpdate = true;
        }

        // 6. LOOP DE ANIMAÇÃO
        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            controls.update();

            globeGroup.rotation.y += 0.0003;

            if(activeMarker) {
                const scale = 0.12 + Math.sin(time * 0.005) * 0.01;
                activeMarker.scale.set(scale, scale, 1);
            }

            renderer.render(scene, camera);
        }
        animate();

        // 7. RESPONSIVIDADE DINÂMICA
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
