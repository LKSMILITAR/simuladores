<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS MILITAR - Projeção Tática (Follow Aircraft Mode)</title>
    <style>
        :root {
            --primary: #00FFCC;
            --secondary: #FFCC00;
            --bg-dark: #020508;
            --panel-bg: rgba(3, 15, 22, 0.95);
            --border-color: rgba(0, 255, 204, 0.3);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body { margin: 0; overflow: hidden; background-color: var(--bg-dark); font-family: 'Courier New', Courier, monospace; color: var(--text-main); display: flex; }

        /* MENU LATERAL LKS MILITAR */
        #sidebar {
            position: absolute; left: 0; top: 0; width: 320px; height: 100vh;
            background: var(--panel-bg); border-right: 1px solid var(--border-color);
            box-shadow: 5px 0 20px rgba(0,0,0,0.8); z-index: 10;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        .brand-title { font-size: 1.4rem; font-weight: bold; color: var(--primary); letter-spacing: 2px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        
        .control-label { font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 8px; }
        
        select {
            width: 100%; background: rgba(0, 0, 0, 0.5); color: var(--primary);
            border: 1px solid var(--border-color); padding: 10px; font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem; font-weight: bold; outline: none; cursor: pointer; margin-bottom: 20px;
        }
        select option { background: var(--bg-dark); color: #FFF; }

        .telemetry-panel { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .data-row { margin-bottom: 12px; }
        .data-label { font-size: 0.7rem; color: var(--text-dim); }
        .data-value { font-size: 1rem; color: var(--primary); font-weight: bold; margin-top: 3px; }
        .data-target { color: var(--secondary); }

        #globeViz { position: absolute; left: 320px; width: calc(100vw - 320px); height: 100vh; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; height: 40vh; top: auto; bottom: 0; border-right: none; border-top: 1px solid var(--border-color); overflow-y: auto;}
            #globeViz { left: 0; width: 100vw; height: 60vh; top: 0; }
        }
    </style>

    <!-- IMPORTANDO O THREE.JS E O GLOBE.GL -->
    <script src="//unpkg.com/three"></script>
    <script src="//unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="sidebar">
        <div class="brand-title">LKS MILITAR<br><span style="font-size: 0.7rem; color: var(--text-dim);">MODO DE VOO CONTÍNUO (FOLLOW)</span></div>

        <label class="control-label">PLATAFORMA DE OPERAÇÃO</label>
        <select id="vector-select"></select>

        <div class="telemetry-panel">
            <div class="data-row">
                <div class="data-label">TELEMETRIA DA AERONAVE</div>
                <div class="data-value" id="disp-coords">INICIANDO SISTEMAS...</div>
            </div>
            <div class="data-row">
                <div class="data-label">RAIO DE AÇÃO OPERACIONAL</div>
                <div class="data-value" id="disp-range">1270 KM</div>
            </div>
            <hr style="border:0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            <div class="data-row">
                <div class="data-label">ALVO DE NAVEGAÇÃO</div>
                <div class="data-value data-target" id="disp-target">VÔO LIVRE (CLIQUE NO GLOBO)</div>
            </div>
            <div style="margin-top: auto; font-size: 0.7rem; color: var(--text-dim); text-align: center;">
                SISTEMA: CÂMERA ACOPLADA AO VETOR
            </div>
        </div>
    </div>

    <div id="globeViz"></div>

    <script>
        // ==========================================
        // 1. DADOS TÁTICOS
        // ==========================================
        const AIRCRAFT_DATABASE = [
            { id: 'f15e', name: 'F-15E Strike Eagle', rangeKm: 1270, color: '#00FFCC' },
            { id: 'su35', name: 'Su-35 Flanker-E', rangeKm: 1600, color: '#FF9900' },
            { id: 'gripen', name: 'JAS 39 Gripen E', rangeKm: 800, color: '#00AABB' },
            { id: 'f22', name: 'F-22 Raptor', rangeKm: 1093, color: '#FFFFFF' }
        ];

        let selectedVector = AIRCRAFT_DATABASE[0];
        const selector = document.getElementById('vector-select');

        AIRCRAFT_DATABASE.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.id; opt.innerText = `${v.name} [ ${v.rangeKm} KM ]`;
            selector.appendChild(opt);
        });

        selector.addEventListener('change', (e) => {
            selectedVector = AIRCRAFT_DATABASE.find(v => v.id === e.target.value);
            document.getElementById('disp-range').innerText = `${selectedVector.rangeKm} KM`;
            flightData.aircraft.color = selectedVector.color;
            flightData.ring.maxR = selectedVector.rangeKm / 111.12;
            flightData.ring.color = selectedVector.color;
        });

        // ==========================================
        // 2. MATEMÁTICA GEODÉSICA (ESFERA)
        // ==========================================
        // Calcula a distância real em KM na superfície
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // Calcula o Azimute (Heading) da Aeronave
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const φ1 = lat1 * toRad, φ2 = lat2 * toRad;
            const Δλ = (lon2 - lon1) * toRad;
            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
            return (Math.atan2(y, x) * (180 / Math.PI) + 360) % 360;
        }

        // Calcula a próxima posição Baseado na Velocidade e Rumo
        function getNextCoordinate(lat, lng, bearing, distanceKm) {
            const R = 6371;
            const latRad = lat * Math.PI / 180;
            const lngRad = lng * Math.PI / 180;
            const brngRad = bearing * Math.PI / 180;
            
            const nextLatRad = Math.asin(Math.sin(latRad) * Math.cos(distanceKm / R) + Math.cos(latRad) * Math.sin(distanceKm / R) * Math.cos(brngRad));
            const nextLngRad = lngRad + Math.atan2(Math.sin(brngRad) * Math.sin(distanceKm / R) * Math.cos(latRad), Math.cos(distanceKm / R) - Math.sin(latRad) * Math.sin(nextLatRad));
            
            return { lat: nextLatRad * 180 / Math.PI, lng: nextLngRad * 180 / Math.PI };
        }

        // ==========================================
        // 3. VARIÁVEIS DE ESTADO DE VOO
        // ==========================================
        const flightData = {
            aircraft: { lat: -15.79, lng: -47.88, heading: 45, color: selectedVector.color },
            ring: { lat: -15.79, lng: -47.88, maxR: selectedVector.rangeKm / 111.12, color: selectedVector.color },
            target: null,
            speedKmPerFrame: 15 // Velocidade de cruzeiro do simulador
        };

        // ==========================================
        // 4. INICIALIZAÇÃO DO GLOBO E INVERSÃO DE TEXTURA
        // ==========================================
        // earth-water.png inverte a lógica: Oceanos ficam brancos (rochosos com bump) e continentes ficam escuros.
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-water.png')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#020508')
            .pointOfView({ altitude: 1.5 })
            .ringsData([flightData.ring])
            .ringColor(d => d.color)
            .ringMaxRadius(d => d.maxR)
            .ringPropagationSpeed(1.5)
            .ringRepeatPeriod(800)
            .customLayerData([flightData.aircraft]);

        // Ajuste material para as massas continentais ficarem táticas
        world.globeMaterial().color = new THREE.Color('#050A0F');
        world.scene().add(new THREE.AmbientLight(0xffffff, 1.2));

        // ==========================================
        // 5. CAÇA GEOMÉTRICO (ESCALA FIXA)
        // ==========================================
        world.customThreeObject(d => {
            const shape = new THREE.Shape();
            shape.moveTo(0, 3);       shape.lineTo(0.5, 1);     shape.lineTo(2.5, -1);
            shape.lineTo(0.5, -1.5);  shape.lineTo(1, -2.5);    shape.lineTo(0, -2);
            shape.lineTo(-1, -2.5);   shape.lineTo(-0.5, -1.5); shape.lineTo(-2.5, -1);
            shape.lineTo(-0.5, 1);    shape.lineTo(0, 3);
            const geometry = new THREE.ExtrudeGeometry(shape, { depth: 0.2, bevelEnabled: true, bevelSize: 0.1, bevelThickness: 0.1 });
            geometry.center(); 
            const material = new THREE.MeshStandardMaterial({ color: '#FFFFFF', metalness: 0.8, roughness: 0.2 });
            const jet = new THREE.Mesh(geometry, material);
            
            // REGRA: Escala Geométrica Fixa - Nunca se altera com o zoom
            jet.scale.setScalar(1.5); 
            return jet;
        });

        world.customThreeObjectUpdate((obj, d) => {
            // Altitude 0.02
            Object.assign(obj.position, world.getCoords(d.lat, d.lng, 0.02));
            
            // Orientação Baseada na Normal do Planeta e no Rumo (Heading)
            const centerVector = obj.position.clone().normalize();
            
            // Projeta um ponto à frente no globo para a aeronave "olhar"
            const lookPosLatLng = getNextCoordinate(d.lat, d.lng, d.heading, 100);
            const lookPos = world.getCoords(lookPosLatLng.lat, lookPosLatLng.lng, 0.02);
            
            const forwardVector = new THREE.Vector3().subVectors(lookPos, obj.position).normalize();
            const rightVector = new THREE.Vector3().crossVectors(forwardVector, centerVector).normalize();
            const trueForward = new THREE.Vector3().crossVectors(centerVector, rightVector).normalize();
            
            const matrix = new THREE.Matrix4().makeBasis(rightVector, centerVector, trueForward);
            obj.quaternion.setFromRotationMatrix(matrix);
            obj.rotateX(Math.PI / 2); // Deita a aeronave
            
            // Atualiza a cor dinamicamente se trocar de caça
            obj.material.color.set(d.color);
        });

        // ==========================================
        // 6. MOTOR PRINCIPAL: FOLLOW AIRCRAFT E ROTA
        // ==========================================
        world.onGlobeClick(({ lat, lng }) => {
            flightData.target = { lat, lng };
            document.getElementById('disp-target').innerHTML = `LAT: ${lat.toFixed(3)}° | LON: ${lng.toFixed(3)}°`;
        });

        function animateFlight() {
            // 1. Navegação Geodésica
            if (flightData.target) {
                const dist = calculateDistance(flightData.aircraft.lat, flightData.aircraft.lng, flightData.target.lat, flightData.target.lng);
                if (dist > flightData.speedKmPerFrame) {
                    flightData.aircraft.heading = calculateBearing(flightData.aircraft.lat, flightData.aircraft.lng, flightData.target.lat, flightData.target.lng);
                    const nextStep = getNextCoordinate(flightData.aircraft.lat, flightData.aircraft.lng, flightData.aircraft.heading, flightData.speedKmPerFrame);
                    flightData.aircraft.lat = nextStep.lat;
                    flightData.aircraft.lng = nextStep.lng;
                } else {
                    flightData.target = null; // Chegou ao alvo
                    document.getElementById('disp-target').innerHTML = "VÔO LIVRE (CLIQUE NO GLOBO)";
                }
            } else {
                // Vôo de Patrulha Contínuo (Segue no último rumo)
                const nextStep = getNextCoordinate(flightData.aircraft.lat, flightData.aircraft.lng, flightData.aircraft.heading, flightData.speedKmPerFrame);
                flightData.aircraft.lat = nextStep.lat;
                flightData.aircraft.lng = nextStep.lng;
            }

            // 2. Atualização dos Dados em Tempo Real
            flightData.ring.lat = flightData.aircraft.lat;
            flightData.ring.lng = flightData.aircraft.lng;
            world.customLayerData([...world.customLayerData()]); // Força re-render da camada
            world.ringsData([...world.ringsData()]);             // Força re-render do anel de combate

            document.getElementById('disp-coords').innerHTML = 
                `LAT: ${flightData.aircraft.lat.toFixed(3)}°<br>LON: ${flightData.aircraft.lng.toFixed(3)}°<br>RUMO (HDG): ${flightData.aircraft.heading.toFixed(1)}°`;

            // 3. SISTEMA "FOLLOW AIRCRAFT" (Trava Câmera, Preserva Zoom)
            const currentZoomAlt = world.pointOfView().altitude;
            // Transição = 0ms garante que a câmera grude na aeronave e a terra se mova
            world.pointOfView({ lat: flightData.aircraft.lat, lng: flightData.aircraft.lng, altitude: currentZoomAlt }, 0);

            requestAnimationFrame(animateFlight);
        }

        // Inicia o motor após 1 segundo
        setTimeout(animateFlight, 1000);

        // Responsividade
        window.addEventListener('resize', () => {
            const width = document.getElementById('globeViz').clientWidth;
            const height = document.getElementById('globeViz').clientHeight;
            world.width(width).height(height);
        });
    </script>
</body>
</html>
