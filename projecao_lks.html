<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS MILITAR - Projeção Tática (MapLibre)</title>
    
    <!-- Motor MapLibre GL JS -->
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css' />
    <script src='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js'></script>

    <style>
        :root {
            --primary: #00FFCC;
            --secondary: #FFCC00;
            --bg-dark: #03070A;
            --panel-bg: rgba(3, 15, 22, 0.9);
            --border-color: rgba(0, 255, 204, 0.3);
        }

        body { margin: 0; padding: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Courier New', Courier, monospace; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* HUD Superior */
        #header-hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 12px 20px; box-sizing: border-box;
            background: linear-gradient(180deg, rgba(3,20,30,0.95) 0%, rgba(3,7,10,0) 100%);
            border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between;
            align-items: center; z-index: 100; pointer-events: none;
        }

        .brand-title { font-size: 1.1rem; font-weight: bold; color: var(--primary); letter-spacing: 2px; }

        /* HUD Inferior - Telemetria */
        #target-hud {
            position: absolute; bottom: 30px; right: 30px; width: 300px;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            padding: 15px; z-index: 90; font-size: 0.8rem; line-height: 1.4; color: white;
            backdrop-filter: blur(5px);
        }
        .hud-label { color: rgba(255,255,255,0.5); font-size: 0.7rem; }
        .hud-value { color: var(--primary); font-weight: bold; }
        .hud-alert { color: var(--secondary); font-size: 0.95rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="header-hud">
        <div class="brand-title">LKS MILITAR // GLOBO TÁTICO</div>
    </div>

    <div id="target-hud">
        <div class="hud-label">TELEMETRIA DE PROJEÇÃO</div>
        <div class="hud-value">VETOR: F-15E STRIKE EAGLE</div>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 8px 0;">
        <div id="coords-display">LAT: -- | LON: --</div>
        <div class="hud-alert">AERONAVE EM ROTA DE INTERCEPTAÇÃO</div>
    </div>

    <!-- Container do Mapa -->
    <div id="map"></div>

    <script>
        // Inicializa o mapa com estilo escuro e a projeção de globo (vertical-perspective)
        const map = new maplibregl.Map({
            container: 'map',
            // Usando um base map escuro gratuito (Carto Dark Matter)
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [-43.2096, -22.9035], // Centro no Rio de Janeiro
            zoom: 2.5, // Zoom inicial bem afastado para ver o globo
            pitch: 20,
            projection: {
                type: "vertical-perspective" // O globo que você encontrou!
            }
        });

        // Função rápida de geometria para desenhar um círculo (Raio de Combate)
        function criarCirculoGeoJSON(centro, raioKm) {
            const pontos = 64;
            const coords = [];
            const distanciaX = raioKm / (111.320 * Math.cos(centro[1] * Math.PI / 180));
            const distanciaY = raioKm / 110.574;

            for(let i = 0; i < pontos; i++) {
                const theta = (i / pontos) * (2 * Math.PI);
                const x = distanciaX * Math.cos(theta);
                const y = distanciaY * Math.sin(theta);
                coords.push([centro[0] + x, centro[1] + y]);
            }
            coords.push(coords[0]); // Fecha o polígono
            return {
                "type": "Feature",
                "geometry": { "type": "Polygon", "coordinates": [coords] }
            };
        }

        map.on('load', () => {
            // 1. Adicionando o Círculo de Alcance (Polygon)
            const raioCombate = criarCirculoGeoJSON([-43.2096, -22.9035], 1270); // 1270km alcance F-15E
            
            map.addSource('raio-combate', {
                'type': 'geojson',
                'data': raioCombate
            });

            map.addLayer({
                'id': 'raio-fill',
                'type': 'fill',
                'source': 'raio-combate',
                'paint': {
                    'fill-color': '#00FFCC',
                    'fill-opacity': 0.1
                }
            });

            map.addLayer({
                'id': 'raio-linha',
                'type': 'line',
                'source': 'raio-combate',
                'paint': {
                    'line-color': '#00FFCC',
                    'line-width': 2,
                    'line-dasharray': [2, 4] // Linha tracejada militar
                }
            });

            // 2. Adicionando a Rota de Voo (Line)
            map.addSource('rota-voo', {
                'type': 'geojson',
                'data': {
                    'type': 'Feature',
                    'geometry': {
                        'type': 'LineString',
                        'coordinates': [
                            [-43.2096, -22.9035], // Origem
                            [-45.5, -20.0],
                            [-47.9292, -15.7801]  // Destino (Brasília)
                        ]
                    }
                }
            });

            map.addLayer({
                'id': 'rota-linha',
                'type': 'line',
                'source': 'rota-voo',
                'layout': {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                'paint': {
                    'line-color': '#FFCC00',
                    'line-width': 3
                }
            });
        });

        // 3. Interação com o Mouse (Atualiza o HUD)
        map.on('mousemove', (e) => {
            const lat = e.lngLat.lat.toFixed(4);
            const lon = e.lngLat.lng.toFixed(4);
            document.getElementById('coords-display').innerText = `LAT: ${lat}° | LON: ${lon}°`;
        });
    </script>
</body>
</html>
