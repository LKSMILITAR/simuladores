<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS MILITAR - Projeção Tática (Globe.GL 3D Vector)</title>
    <style>
        :root {
            --primary: #00FFCC;
            --secondary: #FFCC00;
            --bg-dark: #020508;
            --panel-bg: rgba(3, 15, 22, 0.95);
            --border-color: rgba(0, 255, 204, 0.3);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body { margin: 0; overflow: hidden; background-color: var(--bg-dark); font-family: 'Courier New', Courier, monospace; color: var(--text-main); display: flex; }

        /* MENU LATERAL LKS MILITAR */
        #sidebar {
            position: absolute; left: 0; top: 0; width: 320px; height: 100vh;
            background: var(--panel-bg); border-right: 1px solid var(--border-color);
            box-shadow: 5px 0 20px rgba(0,0,0,0.8); z-index: 10;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        .brand-title { font-size: 1.4rem; font-weight: bold; color: var(--primary); letter-spacing: 2px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        
        .control-label { font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 8px; }
        
        select {
            width: 100%; background: rgba(0, 0, 0, 0.5); color: var(--primary);
            border: 1px solid var(--border-color); padding: 10px; font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem; font-weight: bold; outline: none; cursor: pointer; margin-bottom: 20px;
        }
        select option { background: var(--bg-dark); color: #FFF; }

        .telemetry-panel { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .data-row { margin-bottom: 12px; }
        .data-label { font-size: 0.7rem; color: var(--text-dim); }
        .data-value { font-size: 1rem; color: var(--primary); font-weight: bold; margin-top: 3px; }

        #globeViz { position: absolute; left: 320px; width: calc(100vw - 320px); height: 100vh; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; height: 40vh; top: auto; bottom: 0; border-right: none; border-top: 1px solid var(--border-color); }
            #globeViz { left: 0; width: 100vw; height: 60vh; top: 0; }
        }
    </style>

    <!-- IMPORTANDO O THREE.JS E O GLOBE.GL -->
    <script src="//unpkg.com/three"></script>
    <script src="//unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="sidebar">
        <div class="brand-title">LKS MILITAR<br><span style="font-size: 0.7rem; color: var(--text-dim);">PROJEÇÃO TÁTICA // DGGS + 3D</span></div>

        <label class="control-label">PLATAFORMA DE OPERAÇÃO</label>
        <select id="vector-select"></select>

        <div class="telemetry-panel">
            <div class="data-row">
                <div class="data-label">COORDENADA DA BASE</div>
                <div class="data-value" id="disp-coords">AGUARDANDO CLIQUE...</div>
            </div>
            <div class="data-row">
                <div class="data-label">RAIO DE AÇÃO</div>
                <div class="data-value" id="disp-range">1270 KM</div>
            </div>
            <div style="margin-top: auto; font-size: 0.7rem; color: var(--text-dim); text-align: center;">
                SISTEMA: GLOBE.GL / GEOMETRIA 3D ATIVA
            </div>
        </div>
    </div>

    <div id="globeViz"></div>

    <script>
        const AIRCRAFT_DATABASE = [
            { id: 'f15e', name: 'F-15E Strike Eagle', rangeKm: 1270, color: '#00FFCC' },
            { id: 'su35', name: 'Su-35 Flanker-E', rangeKm: 1600, color: '#FF9900' },
            { id: 'gripen', name: 'JAS 39 Gripen E', rangeKm: 800, color: '#00AABB' },
            { id: 'f22', name: 'F-22 Raptor', rangeKm: 1093, color: '#FFFFFF' }
        ];

        let selectedVector = AIRCRAFT_DATABASE[0];
        const selector = document.getElementById('vector-select');

        AIRCRAFT_DATABASE.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.id; opt.innerText = `${v.name} [ ${v.rangeKm} KM ]`;
            selector.appendChild(opt);
        });

        selector.addEventListener('change', (e) => {
            selectedVector = AIRCRAFT_DATABASE.find(v => v.id === e.target.value);
            document.getElementById('disp-range').innerText = `${selectedVector.rangeKm} KM`;
            
            // Limpa o mapa ao trocar de aeronave
            world.ringsData([]); 
            world.customLayerData([]); 
            document.getElementById('disp-coords').innerText = "AGUARDANDO CLIQUE...";
        });

        // ==========================================
        // 1. INICIALIZAÇÃO DO GLOBO
        // ==========================================
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
            .backgroundColor('#020508')
            .pointOfView({ altitude: 2.5 });

        // Adiciona uma luz ambiente extra para o caça 3D não ficar escuro demais
        world.scene().add(new THREE.AmbientLight(0xffffff, 0.8));

        // ==========================================
        // 2. CONSTRUÇÃO GEOMÉTRICA DO CAÇA 3D (F-22 Genérico)
        // ==========================================
        world.customThreeObject(d => {
            // Este é o código geométrico puro do caça
            const shape = new THREE.Shape();
            shape.moveTo(0, 3);       // Bico
            shape.lineTo(0.5, 1);     // Nariz direito
            shape.lineTo(2.5, -1);    // Asa direita (ponta)
            shape.lineTo(0.5, -1.5);  // Asa direita (trás)
            shape.lineTo(1, -2.5);    // Estabilizador direito
            shape.lineTo(0, -2);      // Motor (centro)
            shape.lineTo(-1, -2.5);   // Estabilizador esquerdo
            shape.lineTo(-0.5, -1.5); // Asa esquerda (trás)
            shape.lineTo(-2.5, -1);   // Asa esquerda (ponta)
            shape.lineTo(-0.5, 1);    // Nariz esquerdo
            shape.lineTo(0, 3);       // Fecha no bico

            // Configuração para dar espessura 3D ao caça
            const extrudeSettings = { depth: 0.2, bevelEnabled: true, bevelSegments: 1, steps: 1, bevelSize: 0.1, bevelThickness: 0.1 };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geometry.center(); 

            // Aplica a cor do Vetor selecionado e faz parecer metal
            const material = new THREE.MeshStandardMaterial({ 
                color: d.color, 
                metalness: 0.6, 
                roughness: 0.3 
            });
            
            const jet = new THREE.Mesh(geometry, material);
            
            // Tamanho inicial da aeronave em relação ao globo
            jet.scale.setScalar(0.5); 
            
            return jet;
        });

        // Define onde e como o Caça fica no Globo
        world.customThreeObjectUpdate((obj, d) => {
            // Altitude 0.05 = Flutuando um pouquinho acima da superfície
            Object.assign(obj.position, world.getCoords(d.lat, d.lng, 0.05));
            
            // Lógica para deitar a aeronave acompanhando a curvatura da Terra e apontando para o Norte
            const centerVector = obj.position.clone().normalize();
            const northPos = world.getCoords(d.lat + 1, d.lng, 0.05);
            const northVector = new THREE.Vector3(northPos.x, northPos.y, northPos.z).sub(obj.position).normalize();
            
            const rightVector = new THREE.Vector3().crossVectors(northVector, centerVector).normalize();
            const forwardVector = new THREE.Vector3().crossVectors(centerVector, rightVector).normalize();
            
            const matrix = new THREE.Matrix4().makeBasis(rightVector, centerVector, forwardVector);
            obj.quaternion.setFromRotationMatrix(matrix);
            
            // Corrige o eixo Z para o caça deitar
            obj.rotateX(Math.PI / 2);
            
            // Aqui é a mágica do ZOOM: O caça aumenta/diminui conforme você dá zoom para nunca sumir da tela
            const dist = world.camera().position.distanceTo(obj.position);
            obj.scale.setScalar(dist * 0.015); // Ajuste esse 0.015 se quiser ele maior ou menor
        });

        // ==========================================
        // 3. O EVENTO DE CLIQUE
        // ==========================================
        world.onGlobeClick(({ lat, lng }) => {
            document.getElementById('disp-coords').innerHTML = `LAT: ${lat.toFixed(3)}°<br>LON: ${lng.toFixed(3)}°`;

            const rangeInDegrees = selectedVector.rangeKm / 111.12;

            // 1. Acende o anel de radar (Raio de Ação)
            world.ringsData([{ lat: lat, lng: lng, maxR: rangeInDegrees }])
                 .ringColor(() => selectedVector.color)
                 .ringMaxRadius('maxR')
                 .ringPropagationSpeed(1.5)
                 .ringRepeatPeriod(800);

            // 2. Coloca o Vetor 3D (Aeronave Geométrica) flutuando ali
            world.customLayerData([{ lat: lat, lng: lng, color: selectedVector.color }]);
        });

        // Responsividade
        window.addEventListener('resize', () => {
            const width = document.getElementById('globeViz').clientWidth;
            const height = document.getElementById('globeViz').clientHeight;
            world.width(width).height(height);
        });
    </script>
</body>
</html>
